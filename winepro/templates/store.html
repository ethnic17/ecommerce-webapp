{% extends "layout.html" %}

{% block content %}

<div class="row">
    {% for item in items %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <div class="card-body">
                    <img src="{{url_for('static', filename='brandimages/' + item.brandpic)}}" alt="">
                    <a href="{{url_for('items.getitem', item_id=item.id)}}">
                    <h5 class="card-title">{{ item.brand }}</h5>
                    </a>
                    <p class="card-text">
                        ₹{{ item.rate }} <br>
                        {{ item.author.username }}
                        
                    </p>

                    <p>{{ item.id }}</p>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock content %}
